apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: network-loss-checkout
  namespace: chaos-testing
spec:
  action: loss
  mode: all
  duration: "600s"
  selector:
    namespaces:
      - default
    labelSelectors:
      app: checkoutservice
  loss:
    loss: "10"
    correlation: "0"
  direction: both
